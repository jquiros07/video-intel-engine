name: Quick Health Check

on:
  push:
  pull_request:

jobs:
  api:
    name: API Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Health check
        run: node --check dist/index.js

  mlprocessing:
    name: ML Processing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlprocessing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Install core dependencies
        run: pip install pyyaml loguru

      - name: Health check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from analyzers.threat.rules import evaluate
          print('Core rules module import: OK')
          "
