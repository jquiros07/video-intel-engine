version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: video-intel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: video_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: video-intel-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    container_name: video-intel-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/video_intel?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-defaultsecretkey}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-60}
    depends_on:
      - postgres
      - redis

  processor:
    build:
      context: ./mlprocessing
    container_name: video-intel-processor
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/video_intel
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
