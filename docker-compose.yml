version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: video-intel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: video_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: video-intel-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"

  api:
    build:
      context: ./api
    container_name: video-intel-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/video_intel?schema=public
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
      - AZURE_QUEUE_NAME=video-processing-queue
      - AZURE_BLOB_CONTAINER_NAME=videos
      - AZURE_BLOB_PUBLIC_BASE_URL=http://localhost:10000/devstoreaccount1/videos
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-defaultsecretkey}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-60}
      - VIDEO_UPLOAD_LIMIT=500mb
      - SERVICE_SECRET=${SERVICE_SECRET:-localservicesecret}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-Video Intel Engine}
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

  processor:
    build:
      context: ./mlprocessing
    container_name: video-intel-processor
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/video_intel
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
      - AZURE_QUEUE_NAME=video-processing-queue
      - AZURE_BLOB_CONTAINER_NAME=videos
      - WORKER_MODE=loop
      - API_BASE_URL=http://api:8080/api
      - SERVICE_SECRET=${SERVICE_SECRET:-localservicesecret}
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  pgdata:
