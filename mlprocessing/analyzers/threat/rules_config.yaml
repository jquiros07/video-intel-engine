analyzer:
  frame_interval: 2
  conf_threshold: 0.5
  weapon_labels:
    - knife
    - scissors
    - baseball bat
    - bottle
    - sports ball

cooldown:
  seconds: 3

risk_score:
  high_threshold: 0.7
  medium_threshold: 0.4
  weights:
    possible_violence: 0.4
    possible_threat: 0.35
    aggressive_pose: 0.3
    aggressive_motion: 0.25
    trajectory_following: 0.25
    close_confrontation: 0.2
    crowd_tension: 0.15

close_confrontation:
  distance_threshold: 100
  confidence: 0.6

crowd_tension:
  min_persons: 4
  confidence: 0.6

aggressive_motion:
  motion_score_threshold: 25
  confidence: 0.65

possible_threat:
  confidence: 0.7

possible_violence:
  motion_score_threshold: 25
  min_close_pairs: 1
  confidence: 0.75

aggressive_pose:
  confidence: 0.72

trajectory_following:
  min_frames: 5
  approach_threshold: 0.35
  confidence: 0.65
